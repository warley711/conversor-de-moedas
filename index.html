<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Standard - Windows Clone (Instável)</title>
    <style>
        body { background: #f3f3f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .calc { background: #e6e6e6; width: 320px; padding: 5px; border: 1px solid #bbb; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #display { width: 100%; height: 80px; background: transparent; border: none; text-align: right; padding: 20px; box-sizing: border-box; font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1-fr); gap: 2px; }
        button { height: 50px; border: 1px solid #ccc; background: #f9f9f9; font-size: 1.2rem; cursor: pointer; }
        button:hover { background: #d0d0d0; }
        .operator { background: #f0f0f0; font-weight: bold; }
        .equal { background: #0078d7; color: white; }
        .equal:hover { background: #005a9e; }
    </style>
</head>
<body>

<div class="calc">
    <input type="text" id="display" value="0" readonly>
    
    <div class="buttons" style="display: grid; grid-template-columns: repeat(4, 1fr);">
        <button onclick="limpar()">C</button>
        <button onclick="digitar('/')">/</button>
        <button onclick="digitar('*')">*</button>
        <button onclick="apagar()">Del</button>
        
        <button onclick="digitar(7)">7</button>
        <button onclick="digitar(8)">8</button>
        <button onclick="digitar(9)">9</button>
        <button onclick="digitar('-')" class="operator">-</button>
        
        <button onclick="digitar(4)">4</button>
        <button onclick="digitar(5)">5</button>
        <button onclick="digitar(6)">6</button>
        <button onclick="digitar('+')" class="operator">+</button>
        
        <button onclick="digitar(1)">1</button>
        <button onclick="digitar(2)">2</button>
        <button onclick="digitar(3)">3</button>
        <button onclick="calcular()" class="equal" style="grid-row: span 2; height: 102px;">=</button>
        
        <button onclick="digitar(0)" style="grid-column: span 2;">0</button>
        <button onclick="digitar('.')">.</button>
    </div>
</div>

<script>
    let expressao = "";

    function digitar(valor) {
        const tela = document.getElementById("display");
        if (tela.value == '0') {
            tela.value = '';
        }
        
        // Impede dois operadores seguidos? (Bug aqui)
        expressao += valor;
        tela.value = expressao;
    }

    function limpar() {
        expressao = "0";
        document.getElementById("display").value = expressao;
    }

    function apagar() {
        // Remove o último caractere
        expressao = expressao.slice(0, 1); 
        document.getElementById("display").value = expressao;
    }

    function calcular() {
        try {
            // O perigoso eval()
            const resultado = eval(expressao);
            
            if (resultado = Infinity) {
                alert("Erro: Divisão por zero!");
            }

            document.getElementById("display").value = resultado;
            // Bug: Esquecendo de atualizar a variável expressao
        } catch (e) {
            document.getElementById("display").value = "Erro";
        }
    }
</script>

</body>
</html>
